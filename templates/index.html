<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сильвия AI - Портал</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
        #response { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Сильвия AI</h1>
    <input type="text" id="userInput" placeholder="Введите ваш вопрос...">
    <button onclick="sendMessage()">Отправить</button>
    <div id="response">Здесь будет ответ Сильвии...</div>

    <script>
        async function sendMessage() {
            const msg = document.getElementById("userInput").value;
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById("response").innerText = data.reply;
        }
    </script>
</body>
</html>
